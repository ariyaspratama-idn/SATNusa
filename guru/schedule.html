<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
<div id="toast-container"></div>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-icon brand-guru">📚</div>
      <div><div class="sidebar-brand-text">AbsensiPro</div><div class="sidebar-brand-role">Panel Guru</div></div>
    </div>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Menu</span>
      <a href="index.html" class="nav-item"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="selfie-attend.html" class="nav-item"><span class="nav-icon">📸</span> Absensi Selfie</a>
      <a href="attendance.html" class="nav-item"><span class="nav-icon">✅</span> Absensi Kelas</a>
      <a href="schedule.html" class="nav-item active"><span class="nav-icon">📅</span> Jadwal Saya</a>
      <a href="my-permits.html" class="nav-item"><span class="nav-icon">📄</span> Pengajuan Izin</a>
      <a href="permits.html" class="nav-item"><span class="nav-icon">🗂️</span> Izin Murid</a>
    </nav>
    <div class="sidebar-footer"><div id="sidebar-user"></div></div>
  </aside>
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title">📅 Jadwal Saya</div>
      <div class="topbar-date" id="topbar-date"></div>
    </div>
    <div class="page-content">
      <div class="page-header">
        <h1 class="page-title">Jadwal Mengajar Saya</h1>
        <p class="page-sub">Semua jam mengajar Anda per minggu</p>
      </div>

      <div class="schedule-grid" id="schedule-grid"></div>
    </div>
  </div>
</div>
<script src="../assets/js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const user = Auth.require(ROLES.GURU);
  if (!user) return;
  document.getElementById('sidebar-user').innerHTML = renderSidebarUser(user);
  renderSchedule(user.id);
});

function renderSchedule(guruId) {
  const today = DateUtils.currentDay();
  const days = [1,2,3,4,5,6];
  const dayNames = {1:'Senin',2:'Selasa',3:'Rabu',4:'Kamis',5:'Jumat',6:'Sabtu'};
  const dayEmoji = {1:'📅',2:'📅',3:'📅',4:'📅',5:'🕌',6:'📝'};
  const scheds = Schedules.getByGuru(guruId);

  const container = document.getElementById('schedule-grid');
  container.innerHTML = days.map(day => {
    const dayScheds = scheds.filter(s => s.day === day).sort((a,b) => a.jamMulai.localeCompare(b.jamMulai));
    const isToday = today === day;
    return `<div class="schedule-day-card">
      <div class="schedule-day-header ${isToday ? 'today' : ''}">
        ${dayEmoji[day]} ${dayNames[day]}
        ${isToday ? '<span class="badge badge-primary" style="margin-left:auto">Hari Ini</span>' : ''}
      </div>
      ${dayScheds.length ? dayScheds.map(s => {
        const cls = Classes.getById(s.classId);
        const numStudents = Students.getByClass(s.classId).length;
        return `<div class="schedule-slot">
          <div class="schedule-time">
            <div style="font-weight:800;color:var(--text);font-size:14px">${s.jamMulai}</div>
            <div style="font-size:11px;color:var(--text-muted)">${s.jamSelesai}</div>
            <div style="font-size:10px;color:var(--text-dim);margin-top:4px">${getDuration(s.jamMulai,s.jamSelesai)} menit</div>
          </div>
          <div class="schedule-mapel" style="flex:1">
            <div class="schedule-mapel-name">${s.mapel}</div>
            <div class="schedule-mapel-class">${cls?.name||'-'} · ${s.room||'-'}</div>
            <div style="font-size:11px;color:var(--text-muted);margin-top:4px">👥 ${numStudents} murid</div>
          </div>
          ${isToday ? `<a href="attendance.html?sch=${s.id}" class="btn btn-sm btn-primary" style="margin:10px 10px 10px 0;align-self:center;white-space:nowrap">✅ Absen</a>` : ''}
        </div>`;
      }).join('') : `<div style="padding:16px;color:var(--text-muted);font-size:13px;text-align:center">Libur</div>`}
    </div>`;
  }).join('');
}

function getDuration(start, end) {
  const [sh, sm] = start.split(':').map(Number);
  const [eh, em] = end.split(':').map(Number);
  return (eh * 60 + em) - (sh * 60 + sm);
}
</script>
</body>
</html>
